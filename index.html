<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QuickFix Gadget Checkout</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .product-details, .checkout-form {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .checkout-form input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .checkout-form button {
      background: #007BFF;
      color: white;
      padding: 15px;
      width: 100%;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    .checkout-form button:hover {
      background: #0056b3;
    }
    .pay-card-btn {
      background: green;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>QuickFix Gadget Checkout</h1>

  <div class="product-details">
    <p><strong>Product:</strong> <span id="product-name">Loading...</span></p>
    <p><strong>Price:</strong> <span id="product-price">Loading...</span></p>
  </div>

  <form class="checkout-form" onsubmit="handleCryptoPayment(event)">
    <label for="customer-name">Full Name</label>
    <input type="text" id="customer-name" required />

    <label for="customer-email">Email</label>
    <input type="email" id="customer-email" required />

    <label for="customer-phone">Phone Number</label>
    <input type="tel" id="customer-phone" required />

    <button type="submit">Pay with Crypto</button>
    <button type="button" id="pay-card" class="pay-card-btn">Pay with Card (Visa / MasterCard)</button>
  </form>

  <script>
    const params = new URLSearchParams(window.location.search);
    const productName = decodeURIComponent(params.get("name") || "Unknown Product");
    const productPrice = decodeURIComponent(params.get("price") || "0.00");

    document.getElementById("product-name").textContent = productName;
    document.getElementById("product-price").textContent = `$${productPrice}`;

    // NOWPayments (Crypto)
    async function handleCryptoPayment(event) {
      event.preventDefault();

      const name = document.getElementById("customer-name").value;
      const email = document.getElementById("customer-email").value;
      const phone = document.getElementById("customer-phone").value;

      const apiKey = "HDYTMWE-Z5SMWXD-J0PK6E1-38VQ6QN"; // 🛠 Replace with your NOWPayments API key
      const orderId = Math.random().toString(36).substring(2, 10);

      const data = {
        price_amount: parseFloat(productPrice),
        price_currency: "usd",
        pay_currency: "btc",
        order_id: orderId,
        order_description: `${productName} for ${name}`,
        success_url: "https://yourstore.com/success",
        cancel_url: "https://yourstore.com/cancel"
      };

      const response = await fetch("https://api.nowpayments.io/v1/invoice", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey
        },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (result.invoice_url) {
        window.location.href = result.invoice_url;
      } else {
        alert("Crypto Payment Failed. Check API key and try again.");
        console.error(result);
      }
    }

    // Square Card Payment
    document.getElementById("pay-card").addEventListener("click", async () => {
      const name = document.getElementById("customer-name").value;
      const email = document.getElementById("customer-email").value;

      if (!name || !email) {
        alert("Please fill out all customer info.");
        return;
      }

      const SQUARE_ACCESS_TOKEN = "EAAAl2-uvdIv-3VRkNuJQnPyPbT3RRuoWnBKTvAQ33E8MR-PY5BAQbzlnjJ8SEnr"; // 🛠 Replace this
      const LOCATION_ID = "sq0idp-pe0MAe3lCpW32Zjr7gyQfg";                      // 🛠 Replace this

      const orderId = Math.random().toString(36).substring(2, 10);

      const paymentData = {
        idempotency_key: orderId,
        order: {
          location_id: LOCATION_ID,
          line_items: [
            {
              name: productName,
              quantity: "1",
              base_price_money: {
                amount: Math.round(parseFloat(productPrice) * 100), // in cents
                currency: "USD"
              }
            }
          ]
        },
        checkout_options: {
          redirect_url: "https://yourstore.com/success"
        }
      };

      try {
        const response = await fetch("https://connect.squareup.com/v2/online-checkout/payment-links", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${SQUARE_ACCESS_TOKEN}`,
            "Accept": "application/json"
          },
          body: JSON.stringify(paymentData)
        });

        const result = await response.json();

        if (result.payment_link && result.payment_link.url) {
          window.location.href = result.payment_link.url;
        } else {
          alert("Card Payment Failed. Check credentials and setup.");
          console.error(result);
        }
      } catch (error) {
        console.error("Error creating Square payment link:", error);
        alert("Error connecting to Square API.");
      }
    });
  </script>
</body>
</html>
