<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QuickFix Gadget Checkout</title>
</head>
<body>
  <h1>Checkout Page</h1>

  <p><strong>Product Name:</strong> <span id="product-name">Loading...</span></p>
  <p><strong>Price:</strong> <span id="product-price">Loading...</span></p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name');
    const price = params.get('price');

    // Insert into the page
    document.getElementById('product-name').textContent = decodeURIComponent(name || 'N/A');
    document.getElementById('product-price').textContent = `$${decodeURIComponent(price || '0.00')}`;
  </script>
</body>
</html>
