<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuickFix Gadget Checkout</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .product-details, .checkout-form {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .checkout-form input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .checkout-form button {
      background: #007BFF;
      color: white;
      padding: 15px;
      width: 100%;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    .checkout-form button:hover {
      background: #0056b3;
    }
    .or-divider {
      text-align: center;
      margin: 20px 0;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>QuickFix Gadget Checkout</h1>
  <div class="product-details">
    <p><strong>Product:</strong> <span id="product-name">Loading...</span></p>
    <p><strong>Price:</strong> <span id="product-price">Loading...</span></p>
  </div>

  <form class="checkout-form" id="cryptoForm">
    <label for="customer-name">Full Name</label>
    <input type="text" id="customer-name" required>

    <label for="customer-email">Email</label>
    <input type="email" id="customer-email" required>

    <label for="customer-phone">Phone Number</label>
    <input type="tel" id="customer-phone" required>

    <button type="submit">Pay with Crypto</button>
  </form>

  <div class="or-divider">OR</div>

  <form class="checkout-form" id="cardForm">
    <button type="submit">Pay with MasterCard/Visa</button>
  </form>

  <script>
    const params = new URLSearchParams(window.location.search);
    const productName = decodeURIComponent(params.get('name') || 'Unknown Product');
    const productPrice = decodeURIComponent(params.get('price') || '0.00');

    document.getElementById('product-name').textContent = productName;
    document.getElementById('product-price').textContent = `$${productPrice}`;

    // Crypto payment (NOWPayments)
    document.getElementById('cryptoForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('customer-name').value;
      const email = document.getElementById('customer-email').value;
      const phone = document.getElementById('customer-phone').value;

      const apiKey = 'HDYTMWE-Z5SMWXD-J0PK6E1-38VQ6QN';
      const data = {
        price_amount: parseFloat(productPrice),
        price_currency: "usd",
        pay_currency: "btc",
        order_id: Math.random().toString(36).substring(2, 10),
        order_description: `${productName} for ${name}`,
        success_url: "https://yourstore.com/success",
        cancel_url: "https://yourstore.com/cancel"
      };

      const response = await fetch('https://api.nowpayments.io/v1/invoice', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey
        },
        body: JSON.stringify(data)
      });

      const result = await response.json();
      if (result.invoice_url) {
        window.location.href = result.invoice_url;
      } else {
        alert('Failed to create crypto payment');
      }
    });

    // Card payment (NOWCharge)
    document.getElementById('cardForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const publicKey = 'e6baaa9b37330e33ca5b4378b5a75c3f202f5bbe3c2201c64fe49ad2ab559435';
      const data = {
        amount: parseFloat(productPrice),
        currency: 'USD',
        description: productName,
        public_key: publicKey,
        success_url: 'https://yourstore.com/success',
        cancel_url: 'https://yourstore.com/cancel'
      };

      const response = await fetch('https://api.nowcharge.com/v1/payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await response.json();
      if (result && result.payment_url) {
        window.location.href = result.payment_url;
      } else {
        alert('Failed to create card payment');
        console.error(result);
      }
    });
  </script>
</body>
</html>
