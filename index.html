<!DOCTYPE html>
<html>
<head>
  <title>Custom Checkout</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; }
    .product { margin-bottom: 10px; }
    .btn { padding: 10px; background: #4caf50; color: white; border: none; margin-top: 20px; cursor: pointer; }
  </style>
</head>
<body>

  <h2>Checkout</h2>
  <div id="productList"></div>
  <p><strong>Total:</strong> $<span id="totalAmount">0.00</span></p>

  <button class="btn" onclick="payNow()">Pay with Crypto (NOWPayments)</button>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const products = JSON.parse(urlParams.get('products') || '[]');
    const total = urlParams.get('total') || '0.00';

    const list = document.getElementById('productList');
    products.forEach(p => {
      const div = document.createElement('div');
      div.className = 'product';
      div.innerText = `${p.quantity} x ${p.title} — $${p.price.toFixed(2)}`;
      list.appendChild(div);
    });

    document.getElementById('totalAmount').textContent = parseFloat(total).toFixed(2);

    function payNow() {
      // Replace with your actual NOWPayments invoice creation link
      window.location.href = `https://nowpayments.io/payment?amount=${total}&currency=usd&iid=YOUR_INVOICE_ID`;
    }
  </script>

</body>
</html>
