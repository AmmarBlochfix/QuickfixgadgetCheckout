<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SolveWithin Checkout</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .product-details, .checkout-form {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .checkout-form input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .checkout-form button {
      background: #007BFF;
      color: white;
      padding: 15px;
      width: 100%;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    .checkout-form button:hover {
      background: #0056b3;
    }
    .pay-card-btn {
      background: green;
      margin-top: 10px;
    }
    #card-container {
      margin-bottom: 20px;
    }
  </style>
  <script src="https://sandbox.web.squarecdn.com/v1/square.js"></script>
</head>
<body>
  <h1>SolveWithin Checkout</h1>

  <div class="product-details">
    <p><strong>Product:</strong> <span id="product-name">Loading...</span></p>
    <p><strong>Price:</strong> <span id="product-price">Loading...</span></p>
  </div>

  <form id="checkout-form" class="checkout-form" onsubmit="handleCryptoPayment(event)">
    <label for="customer-name">Full Name</label>
    <input type="text" id="customer-name" required />

    <label for="customer-email">Email</label>
    <input type="email" id="customer-email" required />

    <label for="customer-phone">Phone Number</label>
    <input type="tel" id="customer-phone" required />

    <div id="card-container"></div>

    <button type="button" id="pay-card" class="pay-card-btn">Pay with Card (Visa / MasterCard)</button>
    <button type="submit">Pay with Crypto</button>
  </form>

  <script>
    // Replace these with your actual Square Application ID and Location ID
    const applicationId = "sq0idp-pe0MAe3lCpW32Zjr7gyQfg";
    const locationId = "EAAAl2ilQ72BsE7s_4EdG1O809qxvtzk9Pc7cVANWtwaFvDFmE5j8KevoIXVkmGi";

    // Product info from URL params
    const params = new URLSearchParams(window.location.search);
    const productName = decodeURIComponent(params.get("name") || "Unknown Product");
    const productPrice = parseFloat(decodeURIComponent(params.get("price") || "0.00"));

    document.getElementById("product-name").textContent = productName;
    document.getElementById("product-price").textContent = `$${productPrice.toFixed(2)}`;

    // Initialize Square payments
    let payments;
    let card;

    async function initializeSquare() {
      if (!window.Square) {
        alert("Square.js failed to load properly.");
        return;
      }

      payments = Square.payments(applicationId, locationId);

      try {
        card = await payments.card();
        await card.attach("#card-container");
      } catch (e) {
        console.error("Initializing Card failed", e);
      }
    }

    initializeSquare();

    // Handle Card Payment
    document.getElementById("pay-card").addEventListener("click", async function () {
      const name = document.getElementById("customer-name").value;
      const email = document.getElementById("customer-email").value;
      const phone = document.getElementById("customer-phone").value;

      if (!name || !email || !phone) {
        alert("Please fill out all customer info.");
        return;
      }

      try {
        const tokenResult = await card.tokenize();
        if (tokenResult.status === "OK") {
          // Send the token and payment info to your backend to complete payment
          const response = await fetch("/process-payment", {  // <- Your backend endpoint
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              sourceId: tokenResult.token,
              amount: productPrice,
              customerName: name,
              customerEmail: email,
              productName: productName
            })
          });

          const result = await response.json();
          if (result.success) {
            alert("Payment successful! Thank you.");
            window.location.href = "/success"; // your success page
          } else {
            alert("Payment failed: " + (result.error || "Unknown error"));
          }
        } else {
          alert("Card tokenization failed: " + tokenResult.errors[0].message);
        }
      } catch (e) {
        console.error(e);
        alert("Payment error: " + e.message);
      }
    });

    // NOWPayments Crypto Payment (Same as before)
    async function handleCryptoPayment(event) {
      event.preventDefault();

      const name = document.getElementById("customer-name").value;
      const email = document.getElementById("customer-email").value;
      const phone = document.getElementById("customer-phone").value;

      const apiKey = "HDYTMWE-Z5SMWXD-J0PK6E1-38VQ6QN"; // Your NOWPayments API key
      const orderId = Math.random().toString(36).substring(2, 10);

      const data = {
        price_amount: productPrice,
        price_currency: "usd",
        pay_currency: "btc",
        order_id: orderId,
        order_description: `${productName} for ${name}`,
        success_url: "https://yourstore.com/success",
        cancel_url: "https://yourstore.com/cancel",
      };

      const response = await fetch("https://api.nowpayments.io/v1/invoice", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
        },
        body: JSON.stringify(data),
      });

      const result = await response.json();

      if (result.invoice_url) {
        window.location.href = result.invoice_url;
      } else {
        alert("Crypto Payment Failed. Check API key and try again.");
        console.error(result);
      }
    }
  </script>
</body>
</html>
