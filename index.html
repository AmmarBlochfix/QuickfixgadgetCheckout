<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SolveWithin Checkout</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .product-details, .checkout-form {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .checkout-form input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .checkout-form button {
      background: #007BFF;
      color: white;
      padding: 15px;
      width: 100%;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    .checkout-form button:hover {
      background: #0056b3;
    }
    #card-container {
      margin-top: 15px;
      margin-bottom: 15px;
    }
    .btn-crypto {
      background: #28a745;
      margin-top: 10px;
    }
  </style>

  <!-- Load Square Payments SDK -->
  <script type="text/javascript" src="https://sandbox.web.squarecdn.com/v1/square.js"></script>
</head>
<body>
  <h1>SolveWithin Checkout</h1>

  <div class="product-details">
    <p><strong>Product:</strong> <span id="product-name">Loading...</span></p>
    <p><strong>Price:</strong> <span id="product-price">Loading...</span></p>
  </div>

  <form class="checkout-form" id="payment-form">
    <label for="customer-name">Full Name</label>
    <input type="text" id="customer-name" required />

    <label for="customer-email">Email</label>
    <input type="email" id="customer-email" required />

    <label for="customer-phone">Phone Number</label>
    <input type="tel" id="customer-phone" required />

    <!-- Square Card Element -->
    <div id="card-container"></div>

    <button id="card-button" type="submit">Pay with Card (Visa / MasterCard)</button>
  </form>

  <button id="crypto-button" class="checkout-form btn-crypto">Pay with Crypto (NOWPayments)</button>

  <script>
    // Load product info from URL
    const params = new URLSearchParams(window.location.search);
    const productName = decodeURIComponent(params.get("name") || "Unknown Product");
    const productPrice = decodeURIComponent(params.get("price") || "0.00");

    document.getElementById("product-name").textContent = productName;
    document.getElementById("product-price").textContent = `$${productPrice}`;

    // Square Config
    const appId = "sq0idp-pe0MAe3lCpW32Zjr7gyQfg"; // Replace with your Square Application ID
    const locationId = "L2E9NXXYXD7FA"; // Replace with your Square Location ID

    let payments;
    let card;

    async function initializeSquare() {
      if (!window.Square) {
        alert("Square.js failed to load!");
        return;
      }

      payments = window.Square.payments(appId, locationId);

      try {
        card = await payments.card();
        await card.attach("#card-container");
      } catch (e) {
        console.error("Failed to initialize card:", e);
        alert("Error initializing card payment form");
      }
    }

    async function tokenize(paymentMethod) {
      const tokenResult = await paymentMethod.tokenize();
      if (tokenResult.status === "OK") {
        return tokenResult.token;
      } else {
        let errorMessage = tokenResult.errors ? tokenResult.errors.map(e => e.message).join(", ") : "Tokenization failed";
        throw new Error(errorMessage);
      }
    }

    // Handle Square Card Payment submission
    document.getElementById("payment-form").addEventListener("submit", async (event) => {
      event.preventDefault();

      const name = document.getElementById("customer-name").value;
      const email = document.getElementById("customer-email").value;
      const phone = document.getElementById("customer-phone").value;

      if (!name || !email || !phone) {
        alert("Please fill out all customer info.");
        return;
      }

      try {
        const token = await tokenize(card);
        console.log("Payment token:", token);

        // TODO: Send the token + order info to your backend to process payment securely
        alert("Card tokenization successful! Send token to backend for charging.");

      } catch (e) {
        alert("Payment error: " + e.message);
      }
    });

    initializeSquare();

    // NOWPayments Config
    const nowPaymentsApiKey = "HDYTMWE-Z5SMWXD-J0PK6E1-38VQ6QN"; // Replace with your NOWPayments API key

    // Handle NOWPayments crypto button
    document.getElementById("crypto-button").addEventListener("click", async () => {
      const name = document.getElementById("customer-name").value;
      const email = document.getElementById("customer-email").value;
      const phone = document.getElementById("customer-phone").value;

      if (!name || !email || !phone) {
        alert("Please fill out all customer info.");
        return;
      }

      const orderId = Math.random().toString(36).substring(2, 10);

      const data = {
        price_amount: parseFloat(productPrice),
        price_currency: "usd",
        pay_currency: "btc", // You can change to other supported currencies or allow user select
        order_id: orderId,
        order_description: `${productName} for ${name}`,
        customer_email: email,
        success_url: "https://yourstore.com/success", // Change to your success page
        cancel_url: "https://yourstore.com/cancel"    // Change to your cancel page
      };

      try {
        const response = await fetch("https://api.nowpayments.io/v1/invoice", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": nowPaymentsApiKey
          },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.invoice_url) {
          window.location.href = result.invoice_url;
        } else {
          alert("Crypto Payment Failed. Check API key and try again.");
          console.error(result);
        }
      } catch (error) {
        alert("Error contacting NOWPayments API.");
        console.error(error);
      }
    });
  </script>
</body>
</html>
