<script>
  function getProductsFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const productsJson = params.get('products');
    if (!productsJson) return [];

    try {
      return JSON.parse(decodeURIComponent(productsJson));
    } catch (e) {
      return [];
    }
  }

  const products = getProductsFromUrl();

  // Now you can loop over products array to display product info and calculate totals
  let total = 0;
  products.forEach(p => {
    // example: display product title and price
    document.write(`<p>${p.title} x${p.quantity} - $${p.price}</p>`);
    total += parseFloat(p.price) * parseInt(p.quantity);
  });

  document.write(`<h3>Total: $${total.toFixed(2)}</h3>`);
</script>
